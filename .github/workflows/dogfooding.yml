name: PyLens Self Analysis (Dogfooding)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  self-analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start PyLens server
        run: |
          SECRET_KEY=ci-test-key uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Analyze PyLens main.py
        id: analyze
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/analyze \
            -H "Content-Type: application/json" \
            -d "{\"code\": \"$(cat app/main.py | head -100)\"}")
          
          echo "$RESPONSE" > /tmp/analysis_result.json
          
          # Extract regime
          REGIME=$(echo "$RESPONSE" | jq -r '.architectural.regime')
          SCORE=$(echo "$RESPONSE" | jq -r '.static_analysis.score')
          
          echo "regime=$REGIME" >> $GITHUB_OUTPUT
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          
          echo "📊 Analysis Result:"
          echo "  Regime: $REGIME"
          echo "  Score: $SCORE"

      - name: Check architectural health
        run: |
          REGIME="${{ steps.analyze.outputs.regime }}"
          SCORE="${{ steps.analyze.outputs.score }}"
          
          echo "🔍 Checking architectural health..."
          echo "  Regime: $REGIME"
          echo "  Score: $SCORE"
          
          # Warn on problematic regimes
          if [[ "$REGIME" == "ENTANGLED"* ]] || [[ "$REGIME" == "PATHOLOGICAL" ]]; then
            echo "⚠️ Warning: Architectural regression detected!"
            echo "  Regime: $REGIME"
            echo "  Consider refactoring."
          fi
          
          # Fail on very low scores
          if [[ "$SCORE" -lt 10 ]]; then
            echo "❌ Critical: Score too low ($SCORE)"
            exit 1
          fi

      - name: Decide action
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/decide \
            -H "Content-Type: application/json" \
            -d "{\"code\": \"$(cat app/main.py | head -100)\"}")
          
          DECISION=$(echo "$RESPONSE" | jq -r '.decision')
          CONFIDENCE=$(echo "$RESPONSE" | jq -r '.confidence')
          RISK=$(echo "$RESPONSE" | jq -r '.risk')
          
          echo "🎯 Decision: $DECISION (confidence: $CONFIDENCE, risk: $RISK)"
          
          echo "$RESPONSE" > /tmp/decision_result.json

      - name: Save analysis artifact
        uses: actions/upload-artifact@v4
        with:
          name: pylens-analysis-${{ github.sha }}
          path: |
            /tmp/analysis_result.json
            /tmp/decision_result.json
          retention-days: 30

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const analysis = JSON.parse(fs.readFileSync('/tmp/analysis_result.json', 'utf8'));
            const decision = JSON.parse(fs.readFileSync('/tmp/decision_result.json', 'utf8'));
            
            const body = `## 🔍 PyLens Self Analysis
            
            | Metric | Value |
            |--------|-------|
            | **Regime** | ${analysis.architectural.regime} |
            | **Score** | ${analysis.static_analysis.score} |
            | **Decision** | ${decision.decision} |
            | **Confidence** | ${decision.confidence} |
            | **Risk** | ${decision.risk} |
            
            ### Key Findings
            ${analysis.architectural.warnings.map(w => `- ⚠️ ${w}`).join('\n') || '- No warnings'}
            
            ### Suggestions
            ${analysis.architectural.suggestions.map(s => `- 💡 ${s}`).join('\n') || '- No suggestions'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Stop server
        if: always()
        run: |
          pkill -f "uvicorn app.main:app" || true
